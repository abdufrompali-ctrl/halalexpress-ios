name: Build iOS app

# Every push to main BUILDS (a smoke check), but nothing is PUBLISHED to users
# unless the run is a version tag (v*) or a manual dispatch. Cut a release with:
#   git tag v1.5.0 && git push origin v1.5.0
on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'source.json'   # avoid a loop when CI commits the catalog back
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write        # create releases + push the updated source.json

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned; build number = run number)
        run: |
          xcodebuild -project HalalExpress.xcodeproj \
            -scheme HalalExpress \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.5.${{ github.run_number }} \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY= \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/HalalExpress.app Payload/
          zip -qry HalalExpress.ipa Payload

      - name: Read version metadata from the built app
        id: meta
        run: |
          PLIST=Payload/HalalExpress.app/Info.plist
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$PLIST")
          SIZE=$(stat -f%z HalalExpress.ipa)
          TAG="v${VERSION}-b${BUILD}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" HalalExpress.ipa \
            --title "Halal Express ${{ steps.meta.outputs.version }} (build ${{ steps.meta.outputs.build }})" \
            --notes "Automated build from ${{ github.sha }}." \
            --target "${{ github.sha }}"

      - name: Regenerate SideStore source catalog
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          REPO: ${{ github.repository }}
          V:    ${{ steps.meta.outputs.version }}
          B:    ${{ steps.meta.outputs.build }}
          SIZE: ${{ steps.meta.outputs.size }}
          TAG:  ${{ steps.meta.outputs.tag }}
          DATE: ${{ steps.meta.outputs.date }}
          SHA:  ${{ github.sha }}
        run: |
          DL="https://github.com/${REPO}/releases/download/${TAG}/HalalExpress.ipa"
          cat > source.json <<JSON
          {
            "name": "Halal Express",
            "identifier": "com.halalexpress.source",
            "subtitle": "Halal Express — official app source",
            "iconURL": "https://halalexpressnc.com/icon-512.png",
            "website": "https://halalexpressnc.com",
            "apps": [
              {
                "name": "Halal Express",
                "bundleIdentifier": "com.halalexpress.app",
                "developerName": "Halal Express",
                "subtitle": "Order authentic halal from the truck",
                "localizedDescription": "Browse the menu, customize your order, and pay for pickup — straight from the Halal Express food truck.",
                "iconURL": "https://halalexpressnc.com/icon-512.png",
                "tintColor": "CC1111",
                "category": "food",
                "versions": [
                  {
                    "version": "${V}",
                    "buildVersion": "${B}",
                    "date": "${DATE}",
                    "localizedDescription": "Automated build ${B} (${SHA}).",
                    "downloadURL": "${DL}",
                    "size": ${SIZE},
                    "minOSVersion": "17.0"
                  }
                ]
              }
            ]
          }
          JSON
          python3 -c "import json;json.load(open('source.json'));print('source.json valid')"

      - name: Commit updated catalog
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source.json
          git commit -m "chore: publish v${{ steps.meta.outputs.version }} build ${{ steps.meta.outputs.build }} to source [skip ci]" || exit 0
          git push

      # NOTE (#15): host-key verification is disabled and the target is a private
      # 10.0.0.1 address unreachable from the GitHub-hosted runner — this step will
      # fail unless run from a self-hosted runner on the VPS network. Pin a known_hosts
      # entry (VPS_KNOWN_HOSTS secret) and use a reachable host before relying on it.
      # Marked non-fatal + gated so a failing deploy can't fail a run that already
      # published the release/catalog; deploy source.json manually until fixed.
      - name: Deploy source.json to VPS
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
        run: |
          echo "$VPS_DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            source.json \
            admin@10.0.0.1:/home/admin/docker/nginx/static/source.json
          rm /tmp/deploy_key

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HalalExpress-unsigned-ipa
          path: HalalExpress.ipa
