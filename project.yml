name: HalalExpress
options:
  bundleIdPrefix: com.halalexpress
  deploymentTarget:
    iOS: "17.0"
# To enable real in-app card payments, add the Square In-App Payments SDK and
# uncomment its dependency on the target below, then run `xcodegen generate`.
# The `#if canImport(SquareInAppPaymentsSDK)` block in PaymentService.swift goes
# live automatically once the module resolves. (See PaymentService.swift header.)
# packages:
#   SquareInAppPaymentsSDK:
#     url: https://github.com/square/in-app-payments-ios
#     from: 1.6.2
targets:
  HalalExpress:
    type: application
    platform: iOS
    sources: [HalalExpress]
    # dependencies:
    #   - package: SquareInAppPaymentsSDK
    info:
      path: HalalExpress/Info.plist
      properties:
        CFBundleDisplayName: Halal Express
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIAppFonts:
          - BebasNeue-Regular.ttf
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halalexpress.app
        MARKETING_VERSION: 1.5.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
